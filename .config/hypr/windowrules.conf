##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps.
windowrule {
  name = ignore-maximize-requests
  match:class = .*

  suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
  name = xwayland-drag-nofocus
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_initial_focus = true
  no_focus = true
}

# SwayNotificationCenter (swaync) Control Center styling
layerrule {
  name = swaync-control-center-effects
  match:namespace = swaync-control-center

  blur = on
  ignore_alpha = 0.2
}

# SwayNotificationCenter (swaync) Notification Window styling
layerrule {
  name = swaync-notification-effects
  match:namespace = swaync-notification-window

  blur = on
  ignore_alpha = 0.2
}

layerrule {
  name = wlogout-effects-logout_dialog
  match:namespace = logout_dialog

  blur = on
  ignore_alpha = 0.2
}

layerrule {
  name = wlogout-effects-wlogout
  match:namespace = wlogout

  blur = on
  ignore_alpha = 0.2
}

# Fix Picture-in-Picture
windowrule {
  name = pip-float
  match:title = ^(Picture-in-Picture)$
  float = true
  pin = true
  size = 400 300
  move = 100%-410 100%-310
}

# -----------------------------------------------------
# GENERIC PERMISSION FIXES
# -----------------------------------------------------
windowrule {
  name = float-dialogs
  match:class = thorium-browser
  match:title = ^(Open|Save|Select|.*Permission.*|.*Use your.*|.*Access.*|.*wants to.*)$
  
  float = true
  center = true
  pin = true
  focus_on_activate = true
  size = 600 400
}

# -----------------------------------------------------
# WHATSAPP & BROWSER CALL FIXES
# -----------------------------------------------------

# WHATSAPP CALL FIX:
# The "WiFi error" happens when the handshake window is tiled or loses focus.
# We force it to float, center, and use 'focusonactivate' to keep the connection alive.
windowrule {
  name = whatsapp-calls
  match:class = thorium-browser
  # Catches "WhatsApp", "WhatsApp - Call", etc.
  match:title = ^(WhatsApp.*)$

  float = true
  center = true
  pin = true
  
  # Important: ensures the window gets input priority during the handshake
  focus_on_activate = true
  
  # Prevents the window from spawning too small (which can freeze rendering)
  size = 600 800
  min_size = 400 400
}


windowrule {
  name = whatsapp-call-stability
  match:class = thorium-browser
  match:title = WhatsApp.*(Call|call|Video|Voice|Ringing|Connecting).*

  # These are dynamic-friendly behaviors
  focus_on_activate = true
  stay_focused = true
}

# SCREEN SHARING BAR FIX:
# Moves the "is sharing your screen" bar to the top-middle so it's out of the way.
# 'no_focus' ensures it doesn't steal your cursor/keyboard input.
windowrule {
  name = browser-sharing-indicators
  match:class = ^$
  match:title = .*sharing.*

  float = true
  pin = true
  no_focus = false
  no_initial_focus = false
  # Moves it to the bottom center
  move = (monitor_w - window_w - 20) (monitor_h - window_h - 20)
}

# Catching Thorium's specific permission bubbles
windowrule {
  name = thorium-permissions
  match:class = thorium-browser
  match:title = ^(Term of Service|about:blank)$

  float = true
  center = true
}

# Hypridle – Battery mode (aggressive power saving)
# Started by ~/.local/bin/hypridle-launch when on battery.

general {
  lock_cmd         = pidof hyprlock || hyprlock -c ~/.config/hypr/hyprlock.conf
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd  = hyprctl dispatch dpms on ; brightnessctl -r
  inhibit_sleep    = true
}

# Dim to 10% after 90 seconds
listener {
  timeout  = 90
  on-timeout = brightnessctl -s set 10%
  on-resume  = brightnessctl -r
}

# Lock after 2.5 minutes
listener {
  timeout  = 150
  on-timeout = loginctl lock-session
}

# Screen off 30 seconds after lock
listener {
  timeout  = 180
  on-timeout = hyprctl dispatch dpms off
  on-resume  = hyprctl dispatch dpms on ; brightnessctl -r
}

# Suspend after 10 minutes
listener {
  timeout  = 600
  on-timeout = systemctl suspend
}

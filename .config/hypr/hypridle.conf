# ~/.config/hypr/hypridle.conf
#
# Safe beginner defaults. Adjust/remove listeners if you don't want DPMS off/suspend.
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
  # Lock screen if available
  lock_cmd = pidof hyprlock || hyprlock -c ~/.config/hypr/hyprlock.conf

  # Good defaults for sleep
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd = hyprctl dispatch dpms on 
}

# Dim screen after 2.5 minutes, restore on activity
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

# Lock after 5 minutes
listener {
  timeout = 300
  on-timeout = loginctl lock-session
}

# Turn display off after 6 minutes, on again when user moves mouse/key
listener {
  timeout = 360
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on && brightnessctl -r 
}

# Suspend after 30 minutes
listener {
  timeout = 1800
  on-timeout = systemctl suspend
}

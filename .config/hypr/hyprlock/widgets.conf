general {
    hide_cursor         = false
    grace               = 0
    disable_loading_bar = true
    no_fade_in          = false
    ignore_empty_input  = true
    immediate_render    = true
}

# ── Background ─────────────────────────────────────────────────
background {
    monitor =
    path       = ~/.config/hypr/hyprlock/wallhaven-2y58wx.jpg
    blur_passes = 3
    blur_size   = 7
    noise       = 0.0117
    brightness  = 0.60
    vibrancy    = 0.15
    vibrancy_darkness = 0.0
}

# ── Greeting ───────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:60000] bash -c 'h=$(date +%H); [ "$h" -lt 12 ] && echo "Good morning" || [ "$h" -lt 18 ] && echo "Good afternoon" || echo "Good evening"'
    color       = rgba(c6a0f6cc)
    font_size   = 18
    font_family = SF Pro Display
    position    = 0, 305
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_color  = rgba(18192699)
}

# ── Time ───────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(cad3f5ff)
    font_size   = 100
    font_family = SF Pro Display Bold
    position    = 0, 218
    halign      = center
    valign      = center
    shadow_passes = 3
    shadow_boost  = 1.2
    shadow_color  = rgba(18192699)
}

# ── Date ───────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = rgba(b8c0e0cc)
    font_size   = 20
    font_family = SF Pro Display
    position    = 0, 133
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_color  = rgba(18192699)
}

# ── Auth card background ────────────────────────────────────────
shape {
    monitor =
    size         = 370, 275
    color        = rgba(1e203055)
    rounding     = 24
    border_size  = 1
    border_color = rgba(363a4f88)
    position     = 0, -68
    halign       = center
    valign       = center
}

# ── Avatar ─────────────────────────────────────────────────────
image {
    monitor =
    path         = ~/.config/hypr/hyprlock/aksil-profile.png
    size         = 90
    border_size  = 3
    border_color = rgba(c6a0f6dd)
    rounding     = -1
    position     = 0, 25
    halign       = center
    valign       = center
    shadow_passes = 2
    shadow_color  = rgba(18192699)
}

# ── Username ───────────────────────────────────────────────────
label {
    monitor =
    text        = $USER
    color       = rgba(cad3f5cc)
    font_size   = 15
    font_family = SF Pro Display
    position    = 0, -58
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_color  = rgba(18192699)
}

# ── Password input ─────────────────────────────────────────────
input-field {
    monitor =
    size              = 310, 52
    outline_thickness = 2
    dots_size         = 0.22
    dots_spacing      = 0.25
    dots_center       = true
    dots_rounding     = -1

    outer_color   = rgba(c6a0f6bb)
    inner_color   = rgba(181926bb)
    font_color    = rgba(cad3f5ff)
    check_color   = rgba(a6da95ee)
    fail_color    = rgba(ed8796ee)
    numlock_color = rgba(eed49fee)
    capslock_color = rgba(f5a97fee)

    fade_on_empty    = true
    font_family      = SF Pro Display
    placeholder_text = <span foreground="##6e738d">󰌾  Type password…</span>
    fail_text        = <span foreground="##ed8796">󰍃  $PAMFAIL</span>

    rounding     = 26

    position     = 0, -130
    halign       = center
    valign       = center
    shadow_passes = 2
    shadow_color  = rgba(18192699)
}

# ── Power buttons (bottom-center, with labels) ──────────────────

# Suspend
label {
    monitor =
    text        = 󰤄
    color       = rgba(a5adcbaa)
    font_size   = 28
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = systemctl suspend
    position    = -120, 92
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(18192699)
}
label {
    monitor =
    text        = Suspend
    color       = rgba(a5adcb77)
    font_size   = 11
    font_family = SF Pro Display
    position    = -120, 58
    halign      = center
    valign      = bottom
}

# Reboot
label {
    monitor =
    text        = 󰜉
    color       = rgba(a5adcbaa)
    font_size   = 28
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = reboot now
    position    = 0, 92
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(18192699)
}
label {
    monitor =
    text        = Reboot
    color       = rgba(a5adcb77)
    font_size   = 11
    font_family = SF Pro Display
    position    = 0, 58
    halign      = center
    valign      = bottom
}

# Shutdown
label {
    monitor =
    text        = 󰐥
    color       = rgba(a5adcbaa)
    font_size   = 28
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = shutdown now
    position    = 120, 92
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(18192699)
}
label {
    monitor =
    text        = Shutdown
    color       = rgba(a5adcb77)
    font_size   = 11
    font_family = SF Pro Display
    position    = 120, 58
    halign      = center
    valign      = bottom
}

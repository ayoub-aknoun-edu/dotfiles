general {
    hide_cursor         = false
    grace               = 0
    disable_loading_bar = true
    no_fade_in          = false
    ignore_empty_input  = true
    immediate_render    = true
}

# ── Background ─────────────────────────────────────────────────
background {
    monitor =
    path       = ~/.config/hypr/hyprlock/wallhaven-2y58wx.jpg
    blur_passes = 3
    blur_size   = 8
    noise       = 0.0117
    brightness  = 0.55
    vibrancy    = 0.12
    vibrancy_darkness = 0.0
}

# ── Time ───────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgba(cad3f5ff)
    font_size   = 96
    font_family = SF Pro Display Bold
    position    = 0, 240
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_boost  = 1.0
    shadow_color  = rgba(00000066)
}

# ── Date ───────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color       = rgba(b8c0e0cc)
    font_size   = 17
    font_family = SF Pro Display
    position    = 0, 155
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_color  = rgba(00000066)
}

# ── Thin divider ───────────────────────────────────────────────
shape {
    monitor =
    size         = 200, 1
    color        = rgba(6e738d55)
    rounding     = 0
    position     = 0, 110
    halign       = center
    valign       = center
}

# ── Auth card background ────────────────────────────────────────
shape {
    monitor =
    size         = 380, 265
    color        = rgba(1e203040)
    rounding     = 28
    border_size  = 1
    border_color = rgba(363a4f60)
    position     = 0, -55
    halign       = center
    valign       = center
}

# ── Avatar ─────────────────────────────────────────────────────
image {
    monitor =
    path         = ~/.config/hypr/hyprlock/aksil-profile.png
    size         = 84
    border_size  = 2
    border_color = rgba(c6a0f6cc)
    rounding     = -1
    position     = 0, 32
    halign       = center
    valign       = center
    shadow_passes = 2
    shadow_color  = rgba(00000066)
}

# ── Username ───────────────────────────────────────────────────
label {
    monitor =
    text        = $USER
    color       = rgba(cad3f5cc)
    font_size   = 14
    font_family = SF Pro Display
    position    = 0, -48
    halign      = center
    valign      = center
}

# ── Password input ─────────────────────────────────────────────
input-field {
    monitor =
    size              = 320, 50
    outline_thickness = 2
    dots_size         = 0.22
    dots_spacing      = 0.25
    dots_center       = true
    dots_rounding     = -1

    outer_color    = rgba(c6a0f6aa)
    inner_color    = rgba(181926aa)
    font_color     = rgba(cad3f5ff)
    check_color    = rgba(a6da95ee)
    fail_color     = rgba(ed8796ee)
    numlock_color  = rgba(eed49fee)
    capslock_color = rgba(f5a97fee)

    fade_on_empty    = true
    font_family      = SF Pro Display
    placeholder_text = <span foreground="##6e738d">󰌾  Type password…</span>
    fail_text        = <span foreground="##ed8796">󰍃  $PAMFAIL</span>

    rounding     = 25

    position     = 0, -112
    halign       = center
    valign       = center
    shadow_passes = 1
    shadow_color  = rgba(00000066)
}

# ── Power buttons ───────────────────────────────────────────────

# Suspend
label {
    monitor =
    text        = 󰤄
    color       = rgba(a5adcbbb)
    font_size   = 26
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = systemctl suspend
    position    = -110, 82
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(00000066)
}
label {
    monitor =
    text        = Suspend
    color       = rgba(a5adcb66)
    font_size   = 10
    font_family = SF Pro Display
    position    = -110, 50
    halign      = center
    valign      = bottom
}

# Reboot
label {
    monitor =
    text        = 󰜉
    color       = rgba(eed49fbb)
    font_size   = 26
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = reboot now
    position    = 0, 82
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(00000066)
}
label {
    monitor =
    text        = Reboot
    color       = rgba(eed49f66)
    font_size   = 10
    font_family = SF Pro Display
    position    = 0, 50
    halign      = center
    valign      = bottom
}

# Shutdown
label {
    monitor =
    text        = 󰐥
    color       = rgba(ed8796bb)
    font_size   = 26
    font_family = JetBrainsMono Nerd Font Propo
    onclick     = shutdown now
    position    = 110, 82
    halign      = center
    valign      = bottom
    shadow_passes = 1
    shadow_color  = rgba(00000066)
}
label {
    monitor =
    text        = Shutdown
    color       = rgba(ed879666)
    font_size   = 10
    font_family = SF Pro Display
    position    = 110, 50
    halign      = center
    valign      = bottom
}

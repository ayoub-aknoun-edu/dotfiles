# Hypridle – AC mode (power available, relaxed timeouts)
# Started by ~/.local/bin/hypridle-launch when AC is online.

general {
  lock_cmd         = pidof hyprlock || hyprlock -c ~/.config/hypr/hyprlock.conf
  before_sleep_cmd = loginctl lock-session && sleep 1
  after_sleep_cmd  = hyprctl dispatch "hl.dsp.dpms('on')" ; brightnessctl -r
  inhibit_sleep    = false
}

# Dim to 30% after 5 minutes
listener {
  timeout  = 300
  on-timeout = brightnessctl -s set 30%
  on-resume  = brightnessctl -r
}

# Lock after 10 minutes
listener {
  timeout  = 600
  on-timeout = loginctl lock-session
}

# Screen off 1 minute after lock
listener {
  timeout  = 660
  on-timeout = hyprctl dispatch "hl.dsp.dpms('off')"
  on-resume  = hyprctl dispatch "hl.dsp.dpms('on')" ; brightnessctl -r
}

# Suspend after 1 hour
listener {
  timeout  = 3600
  on-timeout = systemctl suspend
}
